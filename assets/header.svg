<svg viewBox="0 0 1200 300" width="1200" height="300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kaizhen Tan — Urban Science x Human-centered AI">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2027"/>
      <stop offset="0.55" stop-color="#203A43"/>
      <stop offset="1" stop-color="#2C5364"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#3A6B82" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3A6B82" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- backdrop: city at dusk -->
  <rect width="1200" height="300" fill="url(#sky)"/>
  <ellipse cx="600" cy="126" rx="450" ry="132" fill="url(#centerGlow)"/>

  <!-- faint map contours (urban science motif) -->
  <path d="M0 78 C 300 58 700 100 1200 76" fill="none" stroke="#4E86A6" stroke-opacity="0.10" stroke-width="1.5"/>
  <path d="M0 102 C 350 128 760 86 1200 108" fill="none" stroke="#4E86A6" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- skyline silhouette -->
  <g fill="#0A171D" fill-opacity="0.92">
    <rect x="20" y="232" width="70" height="68"/>
    <rect x="98" y="218" width="48" height="82"/>
    <rect x="152" y="240" width="64" height="60"/>
    <rect x="222" y="210" width="54" height="90"/>
    <rect x="282" y="228" width="80" height="72"/>
    <rect x="368" y="222" width="44" height="78"/>
    <rect x="418" y="244" width="70" height="56"/>
    <rect x="494" y="206" width="58" height="94"/>
    <rect x="558" y="234" width="48" height="66"/>
    <rect x="612" y="214" width="76" height="86"/>
    <rect x="694" y="238" width="52" height="62"/>
    <rect x="752" y="222" width="64" height="78"/>
    <rect x="822" y="246" width="46" height="54"/>
    <rect x="874" y="210" width="78" height="90"/>
    <rect x="958" y="234" width="50" height="66"/>
    <rect x="1014" y="224" width="68" height="76"/>
    <rect x="1088" y="240" width="54" height="60"/>
    <rect x="1148" y="228" width="40" height="72"/>
  </g>

  <!-- dim windows: the ordinary lights of the city -->
  <g fill="#6F9BB0" fill-opacity="0.30">
    <rect x="34" y="248" width="4" height="5"/><rect x="60" y="264" width="4" height="5"/><rect x="38" y="278" width="4" height="5"/>
    <rect x="110" y="236" width="4" height="5"/><rect x="122" y="258" width="4" height="5"/>
    <rect x="166" y="254" width="4" height="5"/><rect x="190" y="270" width="4" height="5"/>
    <rect x="236" y="226" width="4" height="5"/><rect x="250" y="250" width="4" height="5"/>
    <rect x="300" y="244" width="4" height="5"/><rect x="330" y="262" width="4" height="5"/><rect x="302" y="278" width="4" height="5"/>
    <rect x="382" y="238" width="4" height="5"/>
    <rect x="432" y="258" width="4" height="5"/><rect x="456" y="272" width="4" height="5"/>
    <rect x="508" y="222" width="4" height="5"/><rect x="528" y="244" width="4" height="5"/><rect x="510" y="266" width="4" height="5"/>
    <rect x="572" y="250" width="4" height="5"/>
    <rect x="626" y="230" width="4" height="5"/><rect x="668" y="246" width="4" height="5"/>
    <rect x="708" y="254" width="4" height="5"/>
    <rect x="766" y="238" width="4" height="5"/><rect x="790" y="256" width="4" height="5"/>
    <rect x="836" y="260" width="4" height="5"/>
    <rect x="888" y="226" width="4" height="5"/><rect x="912" y="248" width="4" height="5"/><rect x="890" y="268" width="4" height="5"/>
    <rect x="972" y="250" width="4" height="5"/>
    <rect x="1028" y="240" width="4" height="5"/><rect x="1052" y="258" width="4" height="5"/>
    <rect x="1102" y="256" width="4" height="5"/>
    <rect x="1160" y="244" width="4" height="5"/>
  </g>

  <!-- signature: a single window lit amber — the human-centered light in the city -->
  <circle cx="649" cy="230" r="15" fill="#F59E0B" filter="url(#glow)">
    <animate attributeName="fill-opacity" values="0.16;0.42;0.16" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <rect x="645" y="226" width="6" height="8" rx="1" fill="#F6B23C"/>

  <!-- scope frame (map/instrument vernacular) -->
  <g stroke="#3E7CA6" stroke-opacity="0.4" stroke-width="2" fill="none">
    <path d="M26 26 H46 M26 26 V46"/>
    <path d="M1174 26 H1154 M1174 26 V46"/>
    <path d="M26 274 H46 M26 274 V254"/>
    <path d="M1174 274 H1154 M1174 274 V254"/>
  </g>

  <!-- geo eyebrows -->
  <text x="40" y="42" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="14" letter-spacing="1" fill="#7FA8BD" fill-opacity="0.75">40.7128&#176; N &#183; 74.0060&#176; W</text>
  <text x="1160" y="42" text-anchor="end" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="14" letter-spacing="1" fill="#7FA8BD" fill-opacity="0.75">Shanghai &#8596; New York</text>

  <!-- title block -->
  <text x="600" y="152" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="1.5" fill="#F7F4EC">Kaizhen Tan</text>
  <text x="600" y="192" text-anchor="middle" font-family="SFMono-Regular, ui-monospace, Menlo, Consolas, monospace" font-size="21" letter-spacing="4" fill="#AAC9DA">Urban Science &#215; Human-centered AI</text>
</svg>
